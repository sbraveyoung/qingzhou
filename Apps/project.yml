# XcodeGen 配置。修改后跑 `xcodegen generate` 重新生成 Qingzhou.xcodeproj。
# 注意：生成的 .xcodeproj 不要 commit，本仓库 .gitignore 已经忽略。
name: Qingzhou
options:
  bundleIdPrefix: com.sbraveyoung
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  developmentLanguage: zh-Hans
  generateEmptyDirectories: true

# 本地 SPM 包引用 —— 路径是相对于 project.yml 所在目录
packages:
  Qingzhou:
    path: ..

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    # 注意：改了系统扩展代码后必须 +1，否则 sysextd 认为同版本、不会用新代码替换正在跑的旧扩展
    CURRENT_PROJECT_VERSION: "3"
    # 调试期间用自动签名 + 你自己的 Personal Team
    CODE_SIGN_STYLE: Automatic

targets:
  Qingzhou-iOS:
    type: application
    platform: iOS
    sources:
      - path: iOS/Sources
      - path: iOS/Resources
      # App-Shared 双平台共享，但内容物分两种 build phase：
      # - QingzhouAppShortcuts.swift 必须**编译**进 app target（放 SPM 包里抽取不到 autoShortcuts）
      # - *.xcstrings 字符串目录必须走 **Copy Resources**（SPM 包里 Text("中文") 默认查
      #   Bundle.main，目录放 app target 包内代码零改动即命中翻译）
      - path: App-Shared
        excludes: ["*.xcstrings"]
      - path: App-Shared
        includes: ["*.xcstrings"]
        buildPhase: resources
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: 轻舟
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSCameraUsageDescription: 扫描二维码以快速添加节点或订阅
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iCloud Drive 文档容器在「文件」App 里可见（vault：配置镜像，卸载不丢）。
        # 注意：首次让文件夹现身，除了这段还要 CFBundleVersion 变一次 + 设备登录 iCloud。
        NSUbiquitousContainers:
          iCloud.com.sbraveyoung.qingzhou:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: 轻舟
            NSUbiquitousContainerSupportedFolderLevels: One
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sbraveyoung.qingzhou.ios
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: UK7MME38H9
    entitlements:
      path: iOS/Resources/Qingzhou-iOS.entitlements
      properties:
        # 让主 App 能管理 Personal VPN 配置 —— 启停 Packet Tunnel Extension 必需
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        # App Group：主 App 和隧道扩展跨进程共享数据（流量统计 / access log）。
        # 必须写在这里 —— xcodegen 每次 generate 都用 properties 重建 entitlements 文件，
        # 只改 .entitlements 文件会被覆盖掉。
        com.apple.security.application-groups:
          - group.com.sbraveyoung.qingzhou
        # iCloud Drive 文档容器（vault）：配置镜像到用户 iCloud，卸载不丢、换设备可恢复。
        # 需要在 Apple 开发者后台给 App ID 关联这个 iCloud container 并刷新 profile。
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.sbraveyoung.qingzhou
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.sbraveyoung.qingzhou
    dependencies:
      - package: Qingzhou
        product: QingzhouApp
      - package: Qingzhou
        product: QingzhouCore
      - package: Qingzhou
        product: QingzhouLogging
      # 主 App 不再 link XrayCore —— 那会拖进 LibXray.xcframework（85 MB Go runtime），
      # 让 dyld 在启动时多花 1–3 秒。share link → xray 配置的转换挪到了 Extension。
      # PacketTunnel Extension：嵌入到 App，等 entitlement 批复后真机才能跑
      - target: Qingzhou-Tunnel-iOS
        embed: true
        codeSign: true
      # Widget 扩展：主屏小组件 / 锁屏 / iOS 18 控制中心
      - target: Qingzhou-Widget-iOS
        embed: true
        codeSign: true

  Qingzhou-macOS:
    type: application
    platform: macOS
    sources:
      - path: macOS/Sources
      - path: macOS/Resources
      # 同 iOS：App-Shared 源码编译 + 字符串目录走资源（见 Qingzhou-iOS 的注释）
      - path: App-Shared
        excludes: ["*.xcstrings"]
      - path: App-Shared
        includes: ["*.xcstrings"]
        buildPhase: resources
    info:
      path: macOS/Info.plist
      properties:
        CFBundleDisplayName: 轻舟
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        # 不要在 dock 显示，只在状态栏 —— 想要常规窗口模式把这行删掉
        # LSUIElement: true
        NSHumanReadableCopyright: Copyright © 2026
        # 安装系统扩展（来源 App 标注的 content filter）时向用户展示的用途说明。
        # network_extension 类的系统扩展强制要求主 App Info.plist 有这个键，
        # 缺了激活会报 OSSystemExtensionErrorDomain #9 validationFailed。
        NSSystemExtensionUsageDescription: 轻舟需要安装网络扩展，用于标注每条连接由哪个 App 发起（仅本机分析，不上传）。
        # iCloud Drive 文档容器在 Finder 的 iCloud Drive 里可见（vault：配置镜像，卸载不丢）。
        # 注意：首次让文件夹现身，除了这段还要 CFBundleVersion 变一次 + 设备登录 iCloud。
        NSUbiquitousContainers:
          iCloud.com.sbraveyoung.qingzhou:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: 轻舟
            NSUbiquitousContainerSupportedFolderLevels: One
    entitlements:
      path: macOS/Resources/Qingzhou.entitlements
      properties:
        # App Sandbox 上架必须 true，调试期想绕过沙箱限制可改 false
        com.apple.security.app-sandbox: true
        # 出站网络（订阅刷新、测速等都需要）
        com.apple.security.network.client: true
        # 沙箱内弹 NSSavePanel / NSOpenPanel（日志导出等）必需：
        # 缺这条 Powerbox 会静默拒绝，表现为「点了按钮面板不弹」
        com.apple.security.files.user-selected.read-write: true
        # 让主 App 能管理 Personal VPN 配置 —— 启停 Packet Tunnel Extension 必需
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.sbraveyoung.qingzhou
        # 激活 content filter 的 System Extension 需要主 App 有这项
        com.apple.developer.system-extension.install: true
        # iCloud Drive 文档容器（vault）：配置镜像到用户 iCloud，卸载不丢、换设备可恢复。
        # 需要在 Apple 开发者后台给 App ID 关联这个 iCloud container 并刷新 profile。
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.sbraveyoung.qingzhou
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.sbraveyoung.qingzhou
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sbraveyoung.qingzhou.mac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: UK7MME38H9
        # 可执行名 / .app 名 = Qingzhou（不带 -macOS 后缀，菜单栏与进程名更干净）；
        # 图标下的显示名仍是 CFBundleDisplayName「轻舟」。不影响 bundle id / 扩展嵌入。
        PRODUCT_NAME: Qingzhou
    dependencies:
      - package: Qingzhou
        product: QingzhouApp
      - package: Qingzhou
        product: QingzhouCore
      - package: Qingzhou
        product: QingzhouLogging
      # 主 App 不再 link XrayCore —— 那会拖进 LibXray.xcframework（85 MB Go runtime），
      # 让 dyld 在启动时多花 1–3 秒。share link → xray 配置的转换挪到了 Extension。
      # PacketTunnel Extension：嵌入到 App，等 entitlement 批复后才能签真机
      - target: Qingzhou-Tunnel-macOS
        embed: true
        codeSign: true
      # Content Filter 扩展：给连接标注来源 App（需 content-filter-provider entitlement 特批）
      - target: Qingzhou-Filter-macOS
        embed: true
        codeSign: true
      # Widget 扩展：通知中心小组件（与 iOS 主屏版共用实现）
      - target: Qingzhou-Widget-macOS
        embed: true
        codeSign: true

  # ===========================================================================
  # PacketTunnel Extension targets（阶段 2）
  # 共享同一份 Tunnel-Shared/PacketTunnelProvider.swift；现在是 stub，
  # 等接入 sing-box.xcframework 后改为真实现。
  # 这两个 target 当前能编过；要在真机上签名运行，必须先拿到 Apple 的
  # `packet-tunnel-provider` entitlement 批复。
  # ===========================================================================
  Qingzhou-Tunnel-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: Tunnel-Shared
      - path: Tunnel-iOS
    info:
      path: Tunnel-iOS/Info.plist
      properties:
        CFBundleDisplayName: 轻舟 Tunnel
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: Tunnel-iOS/Tunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.sbraveyoung.qingzhou
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sbraveyoung.qingzhou.ios.tunnel
        DEVELOPMENT_TEAM: UK7MME38H9
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: Qingzhou
        product: XrayCore
      # Extension 里要用 QingzhouCore.ProxyMode（share link → xray 配置转换在这里做）。
      - package: Qingzhou
        product: QingzhouCore
      # XrayConfigComposer 现在住在 XrayConfig（纯 Swift，不拖 LibXray）。
      - package: Qingzhou
        product: XrayConfig

  Qingzhou-Tunnel-macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: Tunnel-Shared
      - path: Tunnel-macOS
    info:
      path: Tunnel-macOS/Info.plist
      properties:
        CFBundleDisplayName: 轻舟 Tunnel
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: Tunnel-macOS/Tunnel.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.sbraveyoung.qingzhou
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sbraveyoung.qingzhou.mac.tunnel
        DEVELOPMENT_TEAM: UK7MME38H9
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: Qingzhou
        product: XrayCore
      # Extension 里要用 QingzhouCore.ProxyMode（share link → xray 配置转换在这里做）。
      - package: Qingzhou
        product: QingzhouCore
      # XrayConfigComposer 现在住在 XrayConfig（纯 Swift，不拖 LibXray）。
      - package: Qingzhou
        product: XrayConfig

  # ===========================================================================
  # WidgetKit 扩展 targets（Widget 全家桶）
  # 共享同一份 Widget-Shared/ 源码（仿 Tunnel-Shared 的双平台模式）。
  # 链接 QingzhouApp（静态 SPM 产品，不含 XrayCore → 没有 85MB Go runtime 问题），
  # 直接复用其中的 ToggleVPNIntent / VPNTunnelManager / AppGroupStorage。
  # macOS 的 WidgetKit 扩展也是经典 appex（NSExtension，进 Contents/PlugIns），
  # 不是 ExtensionKit —— 实测系统 Weather.app 的 WeatherWidget.appex 就是这个形态。
  # ===========================================================================
  Qingzhou-Widget-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget-Shared
    info:
      path: Widget-iOS/Info.plist
      properties:
        CFBundleDisplayName: 轻舟小组件
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          # WidgetKit 扩展不需要 NSExtensionPrincipalClass —— 入口是 @main 的 WidgetBundle
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget-iOS/Widget.entitlements
      properties:
        # widget 里 Button(intent:) 的 intent 在 **widget 扩展进程**执行（不是主 App），
        # 启停 VPN（saveToPreferences / startVPNTunnel）需要和主 App 相同的 NE entitlement，
        # 缺了点按钮会静默失败。Apple 后台还需给这个 bundle id 建 App ID 并关联
        # App Group + Network Extensions capability，否则真机装不上。
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        # App Group：读隧道会话标记（tunnel-session.json，已连接时长）用
        com.apple.security.application-groups:
          - group.com.sbraveyoung.qingzhou
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sbraveyoung.qingzhou.ios.widget
        DEVELOPMENT_TEAM: UK7MME38H9
        SWIFT_VERSION: "6.0"
    dependencies:
      - package: Qingzhou
        product: QingzhouApp
      - package: Qingzhou
        product: QingzhouCore
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  Qingzhou-Widget-macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: Widget-Shared
    info:
      path: Widget-macOS/Info.plist
      properties:
        CFBundleDisplayName: 轻舟小组件
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget-macOS/Widget.entitlements
      properties:
        # macOS 扩展必须沙箱化，否则装载校验直接拒绝
        com.apple.security.app-sandbox: true
        # 同 iOS：widget 进程内执行 Toggle intent 启停 VPN，需要 NE entitlement
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.sbraveyoung.qingzhou
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sbraveyoung.qingzhou.mac.widget
        DEVELOPMENT_TEAM: UK7MME38H9
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: Qingzhou
        product: QingzhouApp
      - package: Qingzhou
        product: QingzhouCore
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  # macOS 内容过滤扩展：只观测连接、标注来源 App（bundle id），不阻断。
  # 只在 macOS 有 —— iOS 的 content filter 需要 MDM 监督，普通 App Store app 用不了。
  Qingzhou-Filter-macOS:
    type: system-extension
    platform: macOS
    sources:
      - path: Filter-macOS
    info:
      path: Filter-macOS/Info.plist
      properties:
        CFBundleDisplayName: 轻舟 Filter
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # 系统扩展必须是 SYSX —— OSSystemExtensionManager 枚举 App bundle 时靠这个
        # package type 认出「这是系统扩展」，缺了会被当成非扩展跳过，报
        # "Extension not found in App bundle"。我们给了完整 info.properties，
        # Xcode 不会再自动注入它（GENERATE_INFOPLIST_FILE=NO），所以必须显式写。
        CFBundlePackageType: SYSX
        # network_extension 类的系统扩展，校验时要求扩展自己的 Info.plist 也带用途说明，
        # 缺了激活报 OSSystemExtensionErrorDomain #9 validationFailed（只加在主 App 上不够）。
        NSSystemExtensionUsageDescription: 轻舟用它标注每条连接由哪个 App 发起（仅本机分析，不上传）。
        # System Extension 用 NetworkExtension/NEProviderClasses 声明 provider，
        # 不是 app-extension 的 NSExtension（macOS 26 只认 system extension 形态的 content filter）
        NetworkExtension:
          # 出让给主 App 的 XPC mach service（查端口→App 映射）。必须以 App Group 为前缀，
          # 沙箱主 App 才能查找；不声明的话扩展 NSXPCListener 拿不到这个 mach 名。
          NEMachServiceName: group.com.sbraveyoung.qingzhou.filter
          NEProviderClasses:
            com.apple.networkextension.filter-data: $(PRODUCT_MODULE_NAME).FilterDataProvider
    entitlements:
      path: Filter-macOS/Filter.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        # content-filter-provider 需 Apple 特批（和 packet-tunnel 是两项不同的批复）
        com.apple.developer.networking.networkextension:
          - content-filter-provider
        com.apple.security.application-groups:
          - group.com.sbraveyoung.qingzhou
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sbraveyoung.qingzhou.mac.filter
        # ⚠️ NEProvider 系统扩展的铁律：可执行名（PRODUCT_NAME → CFBundleExecutable）必须
        # 等于 bundle identifier。否则 sysextd 的 service path 与 bundle id 对不上，激活时
        # 报 OSSystemExtensionErrorDomain #4 extensionNotFound（"Unable to find any matched
        # extension with identifier"）——文件明明在 Contents/Library/SystemExtensions/ 也没用。
        # app-extension 形态的 NE provider（Tunnel appex）没这要求，所以只有这个系统扩展中招。
        PRODUCT_NAME: com.sbraveyoung.qingzhou.mac.filter
        # PRODUCT_NAME 带点会污染自动推导的 Swift 模块名，显式钉住，保证 Info.plist 里
        # $(PRODUCT_MODULE_NAME).FilterDataProvider 稳定解析成 Qingzhou_Filter_macOS.FilterDataProvider
        PRODUCT_MODULE_NAME: Qingzhou_Filter_macOS
        DEVELOPMENT_TEAM: UK7MME38H9
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES

schemes:
  Qingzhou-iOS:
    build:
      targets:
        Qingzhou-iOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
  Qingzhou-macOS:
    build:
      targets:
        Qingzhou-macOS: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
